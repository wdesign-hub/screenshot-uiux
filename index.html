<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Screenshot UIUX</title>
<style>
:root{--bg:#0b1120;--card:#111827;--text:#e5e7eb;--muted:#9ca3af;--accent:#6366f1}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:820px;margin:40px auto;padding:0 24px}
header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.logo{width:32px;height:32px;background:#fff;border-radius:8px;display:grid;place-items:center;color:#000;font-weight:800}
.card{background:var(--card);border:1px solid #1f2937;border-radius:16px;padding:24px;margin-bottom:16px}
label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
input,button{font:inherit}
input[type=text],input[type=number]{width:100%;padding:12px 14px;background:#0b1220;border:1px solid #334155;border-radius:10px;color:var(--text)}
.row{display:grid;grid-template-columns:1fr 140px;gap:12px}
.toggles{display:flex;gap:16px;margin:16px 0}
.toggle{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#0b1220;border:1px solid #334155;border-radius:10px;cursor:pointer}
.toggle input{accent-color:var(--accent)}
.btn{background:var(--accent);color:white;border:0;padding:12px 18px;border-radius:10px;font-weight:600;cursor:pointer}
.btn:disabled{opacity:.5}
.muted{color:var(--muted);font-size:13px}
.progress{height:6px;background:#1f2937;border-radius:3px;overflow:hidden;margin-top:12px}
.bar{height:100%;background:var(--accent);width:0%;transition:width .3s}
footer{margin-top:24px;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
<header>
<div class="logo">S</div>
<div><div style="font-weight:700">Screenshot UIUX</div><div class="muted">Desktop + iPhone captures for designers</div></div>
</header>

<div class="card">
<label>Website URL</label>
<div class="row">
<input id="url" type="text" placeholder="https://example.com">
<button id="login" class="btn" style="background:#1f2937">Login</button>
</div>
<div class="muted" id="authStatus" style="margin-top:6px">Not logged in</div>
</div>

<div class="card">
<label>What to capture</label>
<div class="toggles">
<label class="toggle"><input type="checkbox" id="desktop" checked> 💻 Desktop</label>
<label class="toggle"><input type="checkbox" id="mobile" checked> 📱 iPhone</label>
</div>
<div class="row">
<div>
<label>Page limit</label>
<input id="limit" type="number" value="1" min="1" max="500">
</div>
<div>
<label>Output folder</label>
<button id="choose" class="btn" style="width:100%;background:#1f2937">Choose…</button>
</div>
</div>
<div class="muted" style="margin-top:8px">1 = just this page. Enter any number to crawl.</div>
</div>

<div class="card">
<button id="go" class="btn" style="width:100%;padding:14px">Capture Screenshots</button>
<div class="progress"><div class="bar" id="bar"></div></div>
<div class="muted" id="status" style="margin-top:8px">Ready</div>
</div>

<footer>MIT Licensed • wdesign-hub • Auto-updates from GitHub</footer>
</div>

<script>
const $ = id => document.getElementById(id);
let outDir = null;

async function refreshAuth(){ const ok = await window.api.checkAuth(); $('authStatus').textContent = ok ? 'Logged in (valid 7 days)' : 'Not logged in'; }
refreshAuth();

$('choose').onclick = async () => { outDir = await window.api.chooseFolder(); if(outDir) $('choose').textContent = '✓ Folder set'; };
$('login').onclick = async () => { const url = $('url').value || 'https://example.com'; $('login').disabled = true; await window.api.login(url); $('login').disabled = false; refreshAuth(); };
$('go').onclick = async () => {
  const url = $('url').value.trim(); if(!url) return alert('Enter URL');
  if(!outDir) outDir = await window.api.chooseFolder(); if(!outDir) return;
  $('go').disabled = true; $('status').textContent = 'Starting…';
  const opts = { url, limit: $('limit').value, desktop: $('desktop').checked, mobile: $('mobile').checked, outDir };
  window.api.onProgress(p => { const pct = Math.round((p.done/p.total)*100); $('bar').style.width = pct+'%'; $('status').textContent = `Capturing ${p.url}`; });
  const res = await window.api.capture(opts);
  $('status').textContent = `Done — ${res.length} images saved`; $('go').disabled = false; $('bar').style.width='100%';
};
</script>
</body>
</html>
